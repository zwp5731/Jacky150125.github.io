<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>可爱的小正正骐 - 儿童日程管理APP</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-shell">
    <div class="sky-decor" aria-hidden="true">
      <span class="cloud cloud-a"></span>
      <span class="cloud cloud-b"></span>
      <span class="star star-a">⭐</span>
      <span class="star star-b">✨</span>
    </div>
    <svg viewBox="0 0 120 120" class="dog-line bg-dog" aria-hidden="true">
      <circle cx="60" cy="60" r="35" />
      <path d="M38 42 C30 28, 12 32, 20 52" />
      <path d="M82 42 C90 28, 108 32, 100 52" />
      <circle cx="48" cy="60" r="3" />
      <circle cx="72" cy="60" r="3" />
      <path d="M60 62 L55 70 L65 70 Z" />
      <path d="M52 77 Q60 84 68 77" />
    </svg>
    <header class="app-header">
      <div>
        <p class="subtitle">家长和孩子都能轻松使用</p>
        <h1>可爱的小正正骐</h1>
      </div>
      <div class="dog-wrap" aria-hidden="true">
        <svg viewBox="0 0 120 120" class="dog-line">
          <circle cx="60" cy="60" r="35" />
          <path d="M38 42 C30 28, 12 32, 20 52" />
          <path d="M82 42 C90 28, 108 32, 100 52" />
          <circle cx="48" cy="60" r="3" />
          <circle cx="72" cy="60" r="3" />
          <path d="M60 62 L55 70 L65 70 Z" />
          <path d="M52 77 Q60 84 68 77" />
        </svg>
      </div>
    </header>

    <nav class="tabs" id="tabs">
      <button class="tab active" data-view="today">今日活动</button>
      <button class="tab" data-view="calendar">日程管理</button>
      <button class="tab" data-view="files">文件管理</button>
      <button class="tab" data-view="settings">我的</button>
    </nav>

    <main>
      <section id="view-today" class="view active">
        <div id="travelBanner" class="travel-banner hidden">
          <div class="travel-title">🎉 HAPPY TRAVEL 🎉</div>
          <div class="travel-sub">🐶🎒 ✈️ ☀️ 今天是旅行日，记得带上好心情！</div>
        </div>
        <div class="section-head">
          <h2>今天的安排</h2>
          <button id="quickAddBtn" class="btn btn-primary">+ 新建日程</button>
        </div>
        <div id="todayList" class="card-list"></div>
      </section>

      <section id="view-calendar" class="view">
        <div class="section-head">
          <h2>日程管理</h2>
          <div class="inline-actions">
            <select id="calendarMode" class="input small">
              <option value="month">月视图</option>
              <option value="week">周视图</option>
              <option value="day">日视图</option>
            </select>
            <button id="openCreateBtn" class="btn btn-primary">+ 添加日程</button>
          </div>
        </div>
        <div class="calendar-head">
          <button id="prevRange" class="btn">上一段</button>
          <strong id="calendarTitle"></strong>
          <button id="nextRange" class="btn">下一段</button>
        </div>
        <div id="selectedDateTitle" class="selected-date-title"></div>
        <div id="weekdayHeader" class="weekday-head"></div>
        <div id="calendarGrid" class="calendar-grid"></div>
        <div class="section-head compact">
          <h3>所选日期日程</h3>
        </div>
        <div id="calendarEventsPanel" class="card-list"></div>
      </section>

      <section id="view-files" class="view">
        <div class="section-head">
          <h2>文件管理</h2>
          <button id="uploadFileBtn" class="btn btn-primary">+ 上传文件</button>
        </div>
        <div class="file-toolbar">
          <select id="fileCategoryFilter" class="input">
            <option value="all">全部分类</option>
            <option value="image">图片</option>
            <option value="pdf">PDF</option>
            <option value="doc">文档</option>
            <option value="other">其他</option>
          </select>
          <input id="fileSearchInput" class="input" placeholder="搜索文件名或关联日程" />
        </div>
        <div id="fileList" class="card-list"></div>
      </section>

      <section id="view-settings" class="view">
        <h2>我的</h2>
        <div class="card">
          <h4>孩子信息卡片</h4>
          <div class="grid-2">
            <label>身高（cm）
              <input id="heightInput" class="input" placeholder="如 125" />
            </label>
            <label>体重（kg）
              <input id="weightInput" class="input" placeholder="如 26" />
            </label>
            <label>鞋码
              <input id="shoeInput" class="input" placeholder="如 31" />
            </label>
            <label>想要的礼物（每行一个）
              <textarea id="giftsInput" class="input" rows="4" placeholder="积木套装&#10;小狗玩偶"></textarea>
            </label>
          </div>
          <div class="two-actions">
            <button id="saveProfileBtn" class="btn btn-primary" type="button">保存资料</button>
          </div>
        </div>

        <div class="card like-card">
          <h4>家庭点赞互动</h4>
          <p class="muted">点赞可用于兑换礼物，鼓励孩子保持好习惯。</p>
          <div class="like-row">
            <button id="likeBtn" class="btn like-btn" type="button">👍 点赞 +1</button>
            <div class="like-badge">累计点赞：<strong id="likeCount">0</strong></div>
          </div>
          <div id="plusOneFx" class="plus-one">+1</div>
          <div id="likeFxLayer" class="like-fx-layer" aria-hidden="true"></div>
          <div class="redeem-row">
            <input id="redeemCostInput" class="input small" type="number" min="1" value="10" />
            <button id="redeemBtn" class="btn" type="button">兑换礼物（扣减点赞）</button>
          </div>
        </div>

        <div class="card">
          <p><strong>提示：</strong>本原型数据保存在浏览器本地存储。</p>
          <p>你可以直接创建日程、上传附件并在“今日活动 / 文件管理”中联动查看。</p>
        </div>
      </section>
    </main>
  </div>

  <dialog id="scheduleDialog" class="dialog">
    <form id="scheduleForm" method="dialog">
      <h3 id="dialogTitle">新建日程</h3>
      <input type="hidden" id="scheduleId" />
      <label>标题
        <input id="titleInput" class="input" required maxlength="50" />
      </label>
      <label>描述
        <textarea id="descInput" class="input" rows="3" maxlength="300"></textarea>
      </label>
      <label>分类（必选）
        <select id="categoryInput" class="input" required>
          <option value="learning">学习</option>
          <option value="sports">体育</option>
          <option value="travel">旅游</option>
          <option value="art">艺术</option>
          <option value="social">社交</option>
        </select>
      </label>
      <div class="grid-2">
        <label>开始时间
          <input id="startInput" type="datetime-local" class="input" required />
        </label>
        <label>结束时间
          <input id="endInput" type="datetime-local" class="input" required />
        </label>
      </div>
      <label>提醒
        <select id="reminderInput" class="input">
          <option value="none">不提醒</option>
          <option value="10">提前10分钟</option>
          <option value="30">提前30分钟</option>
          <option value="60">提前1小时</option>
          <option value="1440">提前1天</option>
        </select>
      </label>
      <label>上传附件（可多选）
        <input id="scheduleFileInput" type="file" class="input" multiple />
      </label>
      <div id="currentAttachments" class="chips"></div>
      <menu class="dialog-actions">
        <button value="cancel" class="btn">取消</button>
        <button id="saveScheduleBtn" value="default" class="btn btn-primary">保存日程</button>
      </menu>
    </form>
  </dialog>

  <dialog id="fileDialog" class="dialog">
    <form id="fileForm" method="dialog">
      <h3>上传文件</h3>
      <label>选择文件
        <input id="fileUploadInput" type="file" class="input" required />
      </label>
      <label>分类
        <select id="fileCategoryInput" class="input">
          <option value="image">图片</option>
          <option value="pdf">PDF</option>
          <option value="doc">文档</option>
          <option value="other">其他</option>
        </select>
      </label>
      <label>关联日程
        <select id="fileScheduleLinkInput" class="input">
          <option value="">暂不关联</option>
        </select>
      </label>
      <menu class="dialog-actions">
        <button value="cancel" class="btn">取消</button>
        <button value="default" class="btn btn-primary">上传</button>
      </menu>
    </form>
  </dialog>

  <dialog id="linkDialog" class="dialog">
    <form id="linkForm" method="dialog">
      <h3>关联到日程</h3>
      <input id="linkFileId" type="hidden" />
      <label>选择日程
        <select id="linkScheduleInput" class="input" required></select>
      </label>
      <menu class="dialog-actions">
        <button value="cancel" class="btn">取消</button>
        <button value="default" class="btn btn-primary">确认关联</button>
      </menu>
    </form>
  </dialog>

  <script src="./app.js"></script>
</body>
</html>
